# trigger refresh
name: Build Focus Shield APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Safely Fix Folder Structure
      run: |
        echo "=== Creating a clean Android project layout ==="
        mkdir -p clean_src/main/java/com/focusshield/domain
        mkdir -p clean_src/main/java/com/focusshield/vpn
        mkdir -p clean_src/main/java/com/focusshield/core

        echo "=== Locating and moving AndroidManifest ==="
        find . -name "AndroidManifest.xml" -exec cp {} clean_src/main/AndroidManifest.xml \;

        echo "=== Locating and flattening Kotlin code files ==="
        find . -name "MainActivity.kt" -exec cp {} clean_src/main/java/com/focusshield/ \;
        find . -name "FocusShieldApp.kt" -exec cp {} clean_src/main/java/com/focusshield/ \;
        find . -name "HomeScreen.kt" -exec cp {} clean_src/main/java/com/focusshield/ \;
        find . -name "DomainFilter.kt" -exec cp {} clean_src/main/java/com/focusshield/ \;
        find . -name "BlockScreen.kt" -exec cp {} clean_src/main/java/com/focusshield/ \;
        find . -name "DomainResolver.kt" -exec cp {} clean_src/main/java/com/focusshield/domain/ \;
        find . -name "ShieldVpnService.kt" -exec cp {} clean_src/main/java/com/focusshield/vpn/ \;
        find . -name "BlockTrigger.kt" -exec cp {} clean_src/main/java/com/focusshield/core/ \;

        echo "=== Carefully replacing Java folders without deleting icons/themes ==="
        # Delete only the old java folder, leaving the 'res' folder intact
        rm -rf app/src/main/java
        mkdir -p app/src/main/java
        
        # Move the newly structured java files and manifest into place
        cp -r clean_src/main/java/* app/src/main/java/
        cp clean_src/main/AndroidManifest.xml app/src/main/AndroidManifest.xml

    - name: Force App Compatibility Rules
      run: |
        echo "=== Forcing Java 17, Namespace, and suppressing Compose version check ==="
        cat << 'EOF' >> app/build.gradle

        android {
            namespace "com.focusshield"
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
                freeCompilerArgs += [
                    "-P",
                    "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"
                ]
            }
        }
        EOF

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FocusShield-APK
        path: app/build/outputs/apk/debug/app-debug.apk
