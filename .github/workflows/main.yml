# trigger refresh
name: Build Focus Shield APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    # This new step will list all your files so we can find the manifest
    - name: List files in repository (Debugging)
      run: |
        echo "=== Listing all files to find AndroidManifest.xml ==="
        find . -not -path '*/.*'

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FocusShield-APK
        path: app/build/outputs/apk/debug/app-debug.apk
