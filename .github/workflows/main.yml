# trigger refresh
name: Build Focus Shield APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Rebuild Pristine Android Project Layout
      run: |
        echo "=== 1. Backing up Kotlin code files ==="
        mkdir -p /tmp/kt_backup
        find . -name "*.kt" -exec cp {} /tmp/kt_backup/ \;

        echo "=== 2. Wiping old layout and creating perfect structure ==="
        rm -rf app/src
        mkdir -p app/src/main/java/com/focusshield/domain
        mkdir -p app/src/main/java/com/focusshield/vpn
        mkdir -p app/src/main/java/com/focusshield/core
        mkdir -p app/src/main/res/values

        echo "=== 3. Restoring Kotlin files to correct packages ==="
        cp /tmp/kt_backup/MainActivity.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/FocusShieldApp.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/HomeScreen.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/DomainFilter.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/BlockScreen.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/DomainResolver.kt app/src/main/java/com/focusshield/domain/ 2>/dev/null || true
        cp /tmp/kt_backup/ShieldVpnService.kt app/src/main/java/com/focusshield/vpn/ 2>/dev/null || true
        cp /tmp/kt_backup/BlockTrigger.kt app/src/main/java/com/focusshield/core/ 2>/dev/null || true

        echo "=== 4. Generating a flawless AndroidManifest ==="
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="Focus Shield"
                android:supportsRtl="true"
                android:theme="@style/Theme.FocusShield">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service
                    android:name=".vpn.ShieldVpnService"
                    android:exported="false"
                    android:permission="android.permission.BIND_VPN_SERVICE">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

        echo "=== 5. Generating necessary app styles ==="
        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.FocusShield" parent="android:Theme.Material.NoActionBar" />
        </resources>
        EOF

    - name: Force App Compatibility Rules
      run: |
        echo "=== Forcing Java 17, Namespace, and suppressing Compose version check ==="
        cat << 'EOF' >> app/build.gradle

        android {
            namespace "com.focusshield"
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
                freeCompilerArgs += [
                    "-P",
                    "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"
                ]
            }
        }
        EOF

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FocusShield-APK
        path: app/build/outputs/apk/debug/app-debug.apk
