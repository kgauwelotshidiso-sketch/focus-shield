# trigger refresh
name: Build Focus Shield APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Rebuild Pristine Android Project Layout
      run: |
        # Ensure directory structure exists
        mkdir -p app/src/main/java/com/focusshield/core
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml

        # Backup Kotlin files
        mkdir -p /tmp/kt_backup
        find . -name "*.kt" -exec cp {} /tmp/kt_backup/ \;

        # Restore files to proper locations
        cp /tmp/kt_backup/MainActivity.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/HomeScreen.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/BlockScreen.kt app/src/main/java/com/focusshield/ 2>/dev/null || true
        cp /tmp/kt_backup/ShieldAccessibilityService.kt app/src/main/java/com/focusshield/core/ 2>/dev/null || true

        # Write Configs
        cat << 'EOF' > app/src/main/res/xml/accessibility_service_config.xml
        <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
            android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
            android:accessibilityFeedbackType="feedbackGeneric"
            android:accessibilityFlags="flagDefault|flagRetrieveInteractiveWindows|flagIncludeNotImportantViews"
            android:canRetrieveWindowContent="true"
            android:description="@string/accessibility_description" />
        EOF

        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="accessibility_description">Focus Shield requires accessibility access to block distracting content.</string>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Focus Shield" android:theme="@android:style/Theme.Material.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTask">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service android:name=".core.ShieldAccessibilityService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF

    - name: Force App Compatibility
      run: |
        cat << 'EOF' >> app/build.gradle
        android {
            namespace "com.focusshield"
            compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
            kotlinOptions { jvmTarget = '17' }
        }
        EOF

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FocusShield-APK
        path: app/build/outputs/apk/debug/app-debug.apk
